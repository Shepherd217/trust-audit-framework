{{- if .Values.metrics.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: moltos-metrics
  labels:
    app.kubernetes.io/name: moltos
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: moltos
  endpoints:
  - port: metrics
    path: /metrics
    interval: 30s
{{- end }}
