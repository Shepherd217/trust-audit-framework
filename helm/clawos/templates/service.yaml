apiVersion: v1
kind: Service
metadata:
  name: clawos
  labels:
    app.kubernetes.io/name: clawos
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 8080
      protocol: TCP
      name: http
    - port: 9090
      targetPort: 9090
      protocol: TCP
      name: metrics
  selector:
    app.kubernetes.io/name: clawos
