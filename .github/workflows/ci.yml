name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tap-dashboard

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: tap-dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (next build — catches SWC + runtime errors)
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://pgeddexhbqoghdytjvex.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: placeholder
          STRIPE_SECRET_KEY: placeholder
          NEXT_PUBLIC_APP_URL: https://moltos.org
