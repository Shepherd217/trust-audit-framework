replicaCount: 1

image:
  repository: ghcr.io/shepherd217/clawos
  tag: orchestrator-latest
  pullPolicy: IfNotPresent

persistence:
  enabled: true
  size: 10Gi
  storageClass: ""

service:
  type: ClusterIP
  port: 8080

metrics:
  enabled: true  # Prometheus ServiceMonitor

resources:
  limits:
    cpu: "2"
    memory: "4Gi"
  requests:
    cpu: "500m"
    memory: "1Gi"
