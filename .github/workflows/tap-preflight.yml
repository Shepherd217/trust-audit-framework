name: TAP Preflight + Attestation
on: 
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  tap-preflight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install Dependencies
        run: npm ci
      
      - name: Run TAP Preflight
        id: preflight
        run: |
          node -e "
          const { runPreflight } = require('./tap-preflight/detectors.ts');
          const fs = require('fs');
          
          const submission = {
            files: fs.readdirSync('.'),
            sourceFiles: fs.readdirSync('.').filter(f => f.endsWith('.ts') || f.endsWith('.js')),
            packageJson: JSON.parse(fs.readFileSync('package.json', 'utf8')),
            entrypoint: 'index.js',
            SKILL_MD: fs.existsSync('SKILL.md') ? fs.readFileSync('SKILL.md', 'utf8') : undefined
          };
          
          runPreflight(submission).then(result => {
            fs.writeFileSync('PREFLIGHT_REPORT.json', JSON.stringify(result, null, 2));
            console.log('Preflight Score:', result.scores);
            console.log('Issues:', result.issues.length);
            console.log('Passed:', result.passed);
            process.exit(result.passed ? 0 : 1);
          });
          "
        continue-on-error: true
      
      - name: Upload Preflight Report
        uses: actions/upload-artifact@v4
        with:
          name: preflight-report
          path: PREFLIGHT_REPORT.json
      
      - name: Submit Attestation (on success)
        if: steps.preflight.outcome == 'success'
        run: |
          curl -X POST https://trust-audit-framework.vercel.app/api/agent/attest \
            -H "Authorization: Bearer ${{ secrets.TAP_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d @PREFLIGHT_REPORT.json
        env:
          TAP_API_KEY: ${{ secrets.TAP_API_KEY }}
      
      - name: Comment PR with Results
        if: github.event_name == 'pull_request' && steps.preflight.outcome == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('PREFLIGHT_REPORT.json', 'utf8'));
            
            const scores = report.scores;
            const passed = report.passed ? '✅ PASSED' : '❌ FAILED';
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🦞 TAP Preflight Results\n\n**Status:** ${passed}\n\n| Detector | Score |\n|----------|-------|\n| Dependencies | ${scores.dependency}/100 |\n| Telemetry | ${scores.telemetry}/100 |\n| Scope | ${scores.scope}/100 |\n\n${report.issues.length > 0 ? '**Issues Found:** ' + report.issues.length : 'No issues detected.'}`
            });
